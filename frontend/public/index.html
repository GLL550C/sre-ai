<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        console.error('Global error:', msg, 'at', url, 'line', line, 'col', col);
        document.body.innerHTML = '<div style="padding: 20px; color: red;"><h2>JavaScript Error</h2><pre>' + msg + '\n at ' + url + ':' + line + '</pre></div>';
        return false;
      };
    </script>
  </body>
